@if (productsStore.isLoading()) {
  <app-spinner></app-spinner>
} @else {
  <div class="products-list mt-5">
    @for (product of products(); track product.id) {
      <app-product
        [product]="product"
      ></app-product>
    }
  </div>
  <div class="mt-5">
    <ngb-pagination
      [collectionSize]="totalCount"
      [(page)]="currentPage"
      [pageSize]="pageSize"
      [maxSize]="10"
      [boundaryLinks]="true"
      (pageChange)="navigateToPage($event)"
    />
  </div>
}
